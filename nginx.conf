# nginx.conf 

user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;  ## Default: 1024, increase if you have lots of clients
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout  5s;

  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" $status '
    '$body_bytes_sent "$http_referer" "$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;

  upstream app {
    server app:8000;
  }

  server {
    listen 80;
    server_name localhost;
    charset utf-8;
    
    location /static/ {
      autoindex on;
      alias /var/www/app/static/;
    }

    location / {
      proxy_redirect     off;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Host $server_name;
      proxy_pass http://app;
    }

    location /protected/ {
      internal;
      alias /var/www/app/static/download/;
    }

    location ~ ^/flower(/.*)?$ {
      rewrite ^/flower(/.*)$ $1 break;
      rewrite ^/flower$ / break;
      proxy_pass http://flower:5555;
      proxy_redirect ~^(.*)$ /flower$1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $server_name;

      sub_filter 'href="/' 'href="/flower/';
      sub_filter 'src="/' 'src="/flower/';
      sub_filter 'action="/' 'action="/flower/';
      sub_filter 'url("/' 'url("/flower/';
      sub_filter "url('/" "url('/flower/";
      sub_filter '":"/api/' '":"/flower/api/';
      sub_filter "': '/api/" "': '/flower/api/";
      sub_filter '"/api/' '"/flower/api/';
      sub_filter "'/api/" "'/flower/api/";
      sub_filter_once off;
      sub_filter_types text/html text/css application/javascript;
    }

  }
}
